# OWASP Top 10 (2021) Coverage:
# A01 Broken Access Control      → ZAP (DAST)
# A02 Cryptographic Failures     → SpotBugs/FindSecBugs (SAST)
# A03 Injection                  → SpotBugs/FindSecBugs (SAST) + ZAP (DAST)
# A04 Insecure Design            → Manual review (not automated)
# A05 Security Misconfiguration  → ZAP (DAST) + Dependency Check
# A06 Vulnerable Components      → Dependency Check (SCA)
# A07 Auth Failures              → ZAP (DAST)
# A08 Software Integrity         → SpotBugs/FindSecBugs (SAST)
# A09 Logging Failures           → Manual review (not automated)
# A10 SSRF                       → SpotBugs/FindSecBugs (SAST)

name: OWASP Security Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        with:
          project: 'outfront-oms'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired
      
      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: reports/

  spotbugs-sast:
    name: SAST - SpotBugs + FindSecBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build and run SpotBugs with FindSecBugs
        run: |
          mvn clean compile spotbugs:check -B --no-transfer-progress \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Medium \
            -Dspotbugs.plugins=com.h3xstream.findsecbugs:findsecbugs-plugin:1.12.0
      
      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml

  zap-dast:
    name: DAST - ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build application
        run: mvn clean package -DskipTests -B --no-transfer-progress
      
      - name: Start application
        run: |
          java -jar target/*.jar &
          for i in {1..30}; do
            curl -s http://localhost:8080/actuator/health && break
            sleep 2
          done
      
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
      
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: report_html.html
