<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutFront Media — Campaign Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        header h1 { font-size: 1.5rem; font-weight: 700; }
        header p { font-size: 0.85rem; opacity: 0.75; margin-top: 0.15rem; }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
        }
        .toolbar h2 { font-size: 1.15rem; color: #333; }

        .btn {
            padding: 0.5rem 1.1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #0f3460; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #e67e22; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }

        /* Campaign Grid */
        .campaign-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
            padding: 0 2rem 2rem;
        }

        .campaign-card {
            background: white;
            border-radius: 10px;
            padding: 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            transition: box-shadow 0.2s;
        }
        .campaign-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

        .campaign-card h3 { font-size: 1.05rem; }
        .campaign-card .client { color: #555; font-size: 0.9rem; }
        .campaign-card .meta { font-size: 0.82rem; color: #777; }
        .campaign-card .meta span { display: block; margin-bottom: 0.2rem; }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-ACTIVE    { background: #d4edda; color: #155724; }
        .status-DRAFT     { background: #fff3cd; color: #856404; }
        .status-COMPLETED { background: #e2e3e5; color: #383d41; }
        .status-CANCELLED { background: #f8d7da; color: #721c24; }

        .card-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
            grid-column: 1 / -1;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .modal h2 { margin-bottom: 1.25rem; font-size: 1.2rem; }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0f3460;
            box-shadow: 0 0 0 2px rgba(15,52,96,0.15);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1.25rem;
        }

        .form-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>OutFront Media</h1>
            <p>Campaign Management Dashboard</p>
        </div>
    </header>

    <div class="toolbar">
        <h2>Campaigns</h2>
        <button class="btn btn-primary" id="btnNewCampaign">+ New Campaign</button>
    </div>

    <section class="campaign-grid" id="campaignGrid">
        <!-- Cards rendered by JavaScript -->
    </section>

    <!-- Create Campaign Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Create New Campaign</h2>
            <form id="createCampaignForm">
                <div class="form-group">
                    <label for="name">Campaign Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. Times Square Digital">
                </div>
                <div class="form-group">
                    <label for="client">Client</label>
                    <input type="text" id="client" name="client" required placeholder="e.g. Nike">
                </div>
                <div class="form-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" name="startDate" required>
                </div>
                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" name="endDate" required>
                </div>
                <div class="form-group">
                    <label for="budget">Budget ($)</label>
                    <input type="number" id="budget" name="budget" required min="0" step="0.01" placeholder="e.g. 50000">
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" required placeholder="e.g. Highway 101, San Jose">
                </div>
                <div class="form-error" id="formError"></div>
                <div class="form-actions">
                    <button type="button" class="btn" id="btnCancelModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Campaign</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api/campaigns';
        const campaignGrid = document.getElementById('campaignGrid');
        const modalOverlay = document.getElementById('modalOverlay');
        const createForm = document.getElementById('createCampaignForm');
        const formError = document.getElementById('formError');

        // --- Status transition rules ---
        const TRANSITIONS = {
            DRAFT:     ['ACTIVE', 'CANCELLED'],
            ACTIVE:    ['COMPLETED', 'CANCELLED'],
            COMPLETED: [],
            CANCELLED: []
        };

        const TRANSITION_LABELS = {
            ACTIVE:    'Activate',
            COMPLETED: 'Complete',
            CANCELLED: 'Cancel'
        };

        const TRANSITION_STYLES = {
            ACTIVE:    'btn-success',
            COMPLETED: 'btn-warning',
            CANCELLED: 'btn-danger'
        };

        // --- Fetch & render campaigns ---
        async function loadCampaigns() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error('Failed to load campaigns');
                const campaigns = await response.json();
                renderCampaigns(campaigns);
            } catch (error) {
                campaignGrid.innerHTML = `<div class="empty-state">⚠️ Error loading campaigns: ${error.message}</div>`;
            }
        }

        function renderCampaigns(campaigns) {
            if (campaigns.length === 0) {
                campaignGrid.innerHTML = '<div class="empty-state">No campaigns yet. Click "New Campaign" to create one!</div>';
                return;
            }

            campaignGrid.innerHTML = campaigns.map(c => `
                <div class="campaign-card">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <h3>${escapeHtml(c.name)}</h3>
                        <span class="status-badge status-${c.status}">${c.status}</span>
                    </div>
                    <div class="client">${escapeHtml(c.client)}</div>
                    <div class="meta">
                        <span>📅 ${formatDate(c.startDate)} — ${formatDate(c.endDate)}</span>
                        <span>💰 ${formatCurrency(c.budget)}</span>
                        <span>📍 ${escapeHtml(c.location)}</span>
                    </div>
                    <div class="card-actions">
                        ${renderTransitionButtons(c)}
                        <button class="btn btn-danger btn-sm" onclick="deleteCampaign(${c.id}, '${escapeHtml(c.name)}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderTransitionButtons(campaign) {
            const transitions = TRANSITIONS[campaign.status] || [];
            return transitions.map(status =>
                `<button class="btn ${TRANSITION_STYLES[status]} btn-sm" onclick="updateStatus(${campaign.id}, '${status}')">${TRANSITION_LABELS[status]}</button>`
            ).join('');
        }

        // --- Create campaign ---
        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            formError.style.display = 'none';

            const data = {
                name: document.getElementById('name').value,
                client: document.getElementById('client').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                budget: parseFloat(document.getElementById('budget').value),
                location: document.getElementById('location').value
            };

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errorBody = await response.json().catch(() => ({ message: 'Failed to create campaign' }));
                    throw new Error(errorBody.message || JSON.stringify(errorBody));
                }

                closeModal();
                createForm.reset();
                await loadCampaigns();
            } catch (error) {
                formError.textContent = error.message;
                formError.style.display = 'block';
            }
        });

        // --- Update status ---
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_BASE}/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (!response.ok) {
                    const errorBody = await response.json().catch(() => ({ message: 'Status update failed' }));
                    alert(errorBody.message || 'Failed to update status');
                    return;
                }
                await loadCampaigns();
            } catch (error) {
                alert('Error updating status: ' + error.message);
            }
        }

        // --- Delete campaign ---
        async function deleteCampaign(id, name) {
            if (!confirm(`Are you sure you want to delete "${name}"?`)) return;

            try {
                const response = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                if (!response.ok) {
                    alert('Failed to delete campaign');
                    return;
                }
                await loadCampaigns();
            } catch (error) {
                alert('Error deleting campaign: ' + error.message);
            }
        }

        // --- Modal controls ---
        function openModal() { modalOverlay.classList.add('active'); }
        function closeModal() { modalOverlay.classList.remove('active'); formError.style.display = 'none'; }

        document.getElementById('btnNewCampaign').addEventListener('click', openModal);
        document.getElementById('btnCancelModal').addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        // --- Helpers ---
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- Initialize ---
        document.addEventListener('DOMContentLoaded', loadCampaigns);
    </script>
</body>
</html>
