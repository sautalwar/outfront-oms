<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutFront Media — Campaign Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 1.25rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        header h1 { font-size: 1.5rem; font-weight: 700; }
        header p { font-size: 0.85rem; opacity: 0.75; margin-top: 0.15rem; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
        }
        .toolbar h2 { font-size: 1.15rem; color: #333; }

        .btn-primary {
            padding: 0.5rem 1.1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            background: #0f3460;
            color: white;
        }

        .campaign-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
            padding: 0 2rem 2rem;
        }

        .campaign-card {
            background: white;
            border-radius: 10px;
            padding: 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
            grid-column: 1 / -1;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
        }
        .modal h2 { margin-bottom: 1.25rem; }
    </style>
</head>
<body>

    <header>
        <h1>OutFront Media</h1>
        <p>Campaign Management Dashboard</p>
    </header>

    <div class="toolbar">
        <h2>Campaigns</h2>
        <button class="btn-primary" id="btnNewCampaign">+ New Campaign</button>
    </div>

    <section class="campaign-grid" id="campaignGrid">
        <div class="empty-state">Loading campaigns...</div>
    </section>

    <!-- Create Campaign Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Create New Campaign</h2>
            <!-- TODO: Add form fields in Exercise 3 -->
            <p>Form will go here.</p>
        </div>
    </div>

    <script>
        // TODO (Exercise 2): Fetch campaigns from /api/campaigns and render cards
        // TODO (Exercise 3): Wire up the create form
        // TODO (Exercise 4): Add status transition and delete buttons
    </script>
</body>
</html>
